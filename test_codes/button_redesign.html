<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shimmer Buttons Mobile</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-light: #34d399;
            --primary-dark: #059669;
            --shadow: rgba(16, 185, 129, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            padding: 2rem;
            transition: background 0.3s;
        }

        body.light {
            background: #f8fafc;
        }

        /* ===== BASE SHIMMER ===== */
        .btn-shimmer {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            height: 56px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            overflow: hidden;
            isolation: isolate;
            
            /* Animated Gradient Background */
            background: linear-gradient(90deg, 
                var(--primary-dark) 0%, 
                var(--primary) 25%, 
                var(--primary-light) 50%, 
                var(--primary) 75%, 
                var(--primary-dark) 100%
            );
            background-size: 200% 100%;
            animation: shimmer 2.5s linear infinite;
            
            /* Mobile Optimized Shadow */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), 
                        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            touch-action: manipulation;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        /* Shine Sweep Overlay */
        .btn-shimmer::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.5), 
                transparent
            );
            transform: skewX(-20deg);
            animation: shine 2.5s ease-in-out infinite;
            z-index: 1;
        }

        /* Ripple Effect Container */
        .btn-shimmer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), 
                rgba(255,255,255,0.4) 0%, 
                transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 0;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        /* Mobile Touch States (statt Hover) */
        .btn-shimmer:active {
            transform: scale(0.96);
            box-shadow: 0 2px 10px var(--shadow);
            animation-play-state: paused; /* Spart Batterie beim Drücken */
        }

        .btn-shimmer:active::after {
            opacity: 1;
        }

        /* Icon Only Variante */
        .btn-shimmer.icon-only {
            width: 56px;
            padding: 0;
            border-radius: 50%;
        }

        .btn-shimmer.icon-only svg {
            width: 24px;
            height: 24px;
            z-index: 2;
        }

        /* Text Button Icon */
        .btn-shimmer svg {
            width: 20px;
            height: 20px;
            z-index: 2;
            transition: transform 0.2s;
        }

        .btn-shimmer:active svg {
            transform: scale(0.9);
        }

        /* Light Mode Anpassungen */
        body.light .btn-shimmer {
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            color: white;
        }

        /* Accessibility */
        .btn-shimmer:focus-visible {
            outline: 3px solid var(--primary-light);
            outline-offset: 3px;
        }

        /* Reduced Motion (Batterie sparen) */
        @media (prefers-reduced-motion: reduce) {
            .btn-shimmer {
                animation: none;
                background: var(--primary);
            }
            .btn-shimmer::before {
                animation: none;
                display: none;
            }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .btn-shimmer {
                width: 100%;
                max-width: 300px;
            }
        }

        /* Demo Toggle */
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        body.light .mode-toggle {
            background: rgba(0,0,0,0.1);
            color: #1f2937;
            border-color: rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <button class="mode-toggle" onclick="document.body.classList.toggle('light')">
        🌓 Mode
    </button>

    <!-- Mit Text -->
    <button class="btn-shimmer" id="btn1">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
        <span>Jetzt starten</span>
    </button>

    <!-- Icon Only -->
    <button class="btn-shimmer icon-only" aria-label="Speichern" id="btn2">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
    </button>

    <!-- Zweiter Text Button für Demo -->
    <button class="btn-shimmer">
        <span>Download</span>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
    </button>

    <script>
        // Ripple-Position für Touch/Mouse
        document.querySelectorAll('.btn-shimmer').forEach(btn => {
            const updatePos = (e) => {
                const rect = btn.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                btn.style.setProperty('--x', x + '%');
                btn.style.setProperty('--y', y + '%');
            };

            // Touch Support
            btn.addEventListener('touchstart', updatePos, {passive: true});
            // Mouse Support
            btn.addEventListener('mousedown', updatePos);
            
            // Haptic Feedback auf Mobile
            btn.addEventListener('click', () => {
                if (navigator.vibrate) navigator.vibrate(8);
            });
        });

        // Animation pausieren wenn Tab nicht sichtbar (Batterie sparen)
        document.addEventListener('visibilitychange', () => {
            document.querySelectorAll('.btn-shimmer').forEach(btn => {
                btn.style.animationPlayState = document.hidden ? 'paused' : 'running';
            });
        });
    </script>

</body>
</html>
