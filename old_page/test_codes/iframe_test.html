<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBC Instagram Phones</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --phone-body: #000000;
            --screen-bg: #000000;
            --toggle-bg: #000000;
            --toggle-text: #ffffff;
            --shadow: rgba(0,0,0,0.3);
        }
        
        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --phone-body: #ffffff;
            --screen-bg: #000000;
            --toggle-bg: #ffffff;
            --toggle-text: #000000;
            --shadow: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.4s ease;
            padding: 20px;
        }

        /* Toggle Button */
        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            padding: 12px 24px;
            background-color: var(--toggle-bg);
            color: var(--toggle-text);
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s ease;
        }

        /* Container - Standard: Vertikal (Mobil) */
        .phones-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            width: 100%;
            max-width: 1400px;
            margin: 100px auto;
            padding: 20px;
        }

        /* Bei großen Bildschirmen: Horizontal nebeneinander */
        @media (min-width: 900px) {
            .phones-container {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 40px;
            }
        }

        /* Phone Frame - Responsiv */
        .phone-frame {
            width: clamp(300px, 85vw, 360px);
            height: clamp(600px, 170vw, 720px);
            background-color: var(--phone-body);
            border-radius: 50px;
            padding: 12px;
            box-shadow: 0 0 0 2px rgba(128,128,128,0.2), 0 25px 50px rgba(0,0,0,0.3);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            opacity: 0;
            transform: translateY(80px) scale(0.95);
        }

        .phone-frame.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Notch */
        .phone-notch {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 25px;
            background-color: var(--phone-body);
            border-radius: 0 0 20px 20px;
            z-index: 20;
            transition: background-color 0.4s ease;
        }

        /* Screen */
        .phone-screen {
            width: 100%;
            height: 100%;
            background-color: var(--screen-bg);
            border-radius: 40px;
            overflow: hidden;
            position: relative;
        }

        /* BOOT SCREEN */
        .boot-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .boot-screen.booted {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        .boot-logo {
            width: 120px;
            height: auto;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: brightness(0) invert(1); /* Weißes Logo auf schwarzem Hintergrund */
        }

        .phone-frame.visible .boot-logo {
            opacity: 1;
            transform: scale(1);
        }

        /* Progress Bar für Boot */
        .boot-progress {
            width: 100px;
            height: 3px;
            background: #333;
            border-radius: 3px;
            margin-top: 40px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .phone-frame.visible .boot-progress {
            opacity: 1;
        }

        .boot-progress::after {
            content: '';
            display: block;
            width: 0%;
            height: 100%;
            background: white;
            animation: bootLoad 1.5s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes bootLoad {
            to { width: 100%; }
        }

        /* Instagram Content */
        .instagram-container {
            width: 100%;
            height: 100%;
            background-color: #fff;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .instagram-container.loaded {
            opacity: 1;
        }

        .instagram-container iframe {
            width: 100% !important;
            min-width: 100% !important;
            border: none !important;
        }

        /* Seitentasten */
        .phone-frame::before {
            content: '';
            position: absolute;
            right: -3px;
            top: 120px;
            width: 4px;
            height: 80px;
            background-color: var(--phone-body);
            border-radius: 0 2px 2px 0;
        }

        .phone-frame::after {
            content: '';
            position: absolute;
            left: -3px;
            top: 100px;
            width: 4px;
            height: 60px;
            background-color: var(--phone-body);
            border-radius: 2px 0 0 2px;
            box-shadow: 0 70px 0 var(--phone-body);
        }

        /* Mobile Optimierung */
        @media (max-width: 899px) {
            .mode-toggle {
                top: 10px;
                right: 10px;
                padding: 10px 18px;
                font-size: 13px;
            }
            
            .phones-container {
                margin-top: 70px;
                gap: 40px;
            }
        }
    </style>
</head>
<body>

    <button class="mode-toggle" onclick="toggleTheme()" id="themeToggle">
        <span id="icon">🌙</span>
        <span id="btnText">Dark Mode</span>
    </button>

    <div class="phones-container">
        <!-- Phone 1 -->
        <div class="phone-frame" data-id="1">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div class="boot-screen" id="boot-1">
                    <!-- Passe den Pfad zu deinem Logo an -->
                    <img src="ibc_logo_original.webp" 
                         alt="IBC Logo" 
                         class="boot-logo" 
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>'">
                    <div class="boot-progress"></div>
                </div>
                <div class="instagram-container" id="content-1">
                    <blockquote class="instagram-media" 
                                data-instgrm-captioned 
                                data-instgrm-permalink="https://www.instagram.com/reel/DWOGn1ACMNI/?utm_source=ig_embed&amp;utm_campaign=loading" 
                                data-instgrm-version="14">
                        <div style="padding:0;">
                            <a href="https://www.instagram.com/reel/DWOGn1ACMNI/" style="text-decoration:none;" target="_blank">
                                <div style="padding:19% 0; background:#f4f4f4;"></div>
                            </a>
                        </div>
                    </blockquote>
                </div>
            </div>
        </div>

        <!-- Phone 2 -->
        <div class="phone-frame" data-id="2">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div class="boot-screen" id="boot-2">
                    <img src="ibc_logo_original.webp" 
                         alt="IBC Logo" 
                         class="boot-logo"
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>'">
                    <div class="boot-progress"></div>
                </div>
                <div class="instagram-container" id="content-2">
                    <blockquote class="instagram-media" 
                                data-instgrm-captioned 
                                data-instgrm-permalink="https://www.instagram.com/reel/DWOGn1ACMNI/?utm_source=ig_embed&amp;utm_campaign=loading" 
                                data-instgrm-version="14">
                        <div style="padding:0;">
                            <a href="https://www.instagram.com/reel/DWOGn1ACMNI/" target="_blank">
                                <div style="padding:19% 0; background:#f4f4f4;"></div>
                            </a>
                            <p style="color:#c9c8cd; font-size:14px; text-align:center; margin-top:8px;">
                                <a href="https://www.instagram.com/reel/DWOGn1ACMNI/" style="color:#c9c8cd; text-decoration:none;" target="_blank">IBC Furtwangen</a>
                            </p>
                        </div>
                    </blockquote>
                </div>
            </div>
        </div>

        <!-- Phone 3 (Beispiel für mehr) -->
        <div class="phone-frame" data-id="3">
            <div class="phone-notch"></div>
            <div class="phone-screen">
                <div class="boot-screen" id="boot-3">
                    <img src="ibc_logo_original.webp" 
                         alt="IBC Logo" 
                         class="boot-logo"
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>'">
                    <div class="boot-progress"></div>
                </div>
                <div class="instagram-container" id="content-3">
                    <blockquote class="instagram-media" 
                                data-instgrm-captioned 
                                data-instgrm-permalink="https://www.instagram.com/reel/DWOGn1ACMNI/?utm_source=ig_embed&amp;utm_campaign=loading" 
                                data-instgrm-version="14">
                        <div style="padding:0;">
                            <a href="https://www.instagram.com/reel/DWOGn1ACMNI/" target="_blank">
                                <div style="padding:19% 0; background:#f4f4f4;"></div>
                            </a>
                        </div>
                    </blockquote>
                </div>
            </div>
        </div>
    </div>

    <script async src="//www.instagram.com/embed.js"></script>

    <script>
        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            
            if (isDark) {
                html.removeAttribute('data-theme');
                document.getElementById('icon').textContent = '🌙';
                document.getElementById('btnText').textContent = 'Dark Mode';
            } else {
                html.setAttribute('data-theme', 'dark');
                document.getElementById('icon').textContent = '☀️';
                document.getElementById('btnText').textContent = 'Light Mode';
            }
        }

        // Boot Animation für jedes Phone
        function bootPhone(phoneFrame) {
            const id = phoneFrame.getAttribute('data-id');
            const bootScreen = document.getElementById(`boot-${id}`);
            const content = document.getElementById(`content-${id}`);
            
            // Logo Animation starten
            phoneFrame.classList.add('visible');
            
            // Nach 2 Sekunden: Instagram anzeigen
            setTimeout(() => {
                if (bootScreen) bootScreen.classList.add('booted');
                if (content) content.classList.add('loaded');
                
                // Instagram Embed verarbeiten falls noch nicht geschehen
                if (window.instgrm) {
                    window.instgrm.Embeds.process();
                }
            }, 2000);
        }

        // Intersection Observer für Scroll-Effekt
        const observerOptions = {
            threshold: 0.2,
            rootMargin: "0px 0px -50px 0px"
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !entry.target.classList.contains('visible')) {
                    bootPhone(entry.target);
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // Alle Phones beobachten UND erstes sofort starten falls sichtbar
        document.querySelectorAll('.phone-frame').forEach((phone, index) => {
            observer.observe(phone);
            
            // Fallback: Erstes Phone nach kurzem Timeout starten falls IntersectionObserver nicht feuert
            if (index === 0) {
                setTimeout(() => {
                    if (!phone.classList.contains('visible')) {
                        const rect = phone.getBoundingClientRect();
                        if (rect.top < window.innerHeight) {
                            bootPhone(phone);
                        }
                    }
                }, 500);
            }
        });

        // Initiales Instagram Processing
        if (window.instgrm) {
            window.instgrm.Embeds.process();
        }
    </script>
</body>
</html>
